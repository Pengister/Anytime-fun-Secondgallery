<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Indoor Party Center.</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
:root {
  font-size: 62.5%;
  --primary: #0f172a;
  --accent: #2563eb;
  --bg: #f8fafc;
  --card-bg: #ffffff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--primary);
}

.section {
  padding: 2rem;
  max-width: 120rem;
  margin: 0 auto;
}

.section h2 {
  font-size: 2.8rem;
  text-align: center;
  margin-bottom: 3rem;
}

/* FIXED GRID */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2rem;
}

/* CARD */
.card {
  background: var(--card-bg);
  border-radius: 1.6rem;
  overflow: hidden;
  box-shadow: 0 1rem 2rem rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
}

.card-header {
  padding: 1.5rem;
  font-size: 1.8rem;
  font-weight: 600;
}

/* SWIPER */
.swiper {
  width: 100%;
  height: 20rem;
  cursor: pointer;
}

.swiper-slide a {
  display: block;
  width: 100%;
  height: 100%;
}

.swiper-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}

.swiper-slide img:hover {
  transform: scale(1.05);
}

.swiper-button-next,
.swiper-button-prev {
  color: #fff;
  transform: scale(0.75);
}

/* RESPONSIVE */
@media (max-width: 1024px) {
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
  .gallery-grid { grid-template-columns: 1fr; }
  .swiper { height: 24rem; }
}
</style>

</head>

<body>

<section class="section">
<h2>Indoor Party Center</h2>

<div class="gallery-grid">

<!-- CARD 1 -->
<div class="card">
  <div class="card-header">Nerf Battle Tag</div>
  <div class="swiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide">
        <a href="https://www.fargotag.com/" target="_blank">
          <img src="https://github.com/Pengister/Anytime-fun-first-gallery/blob/main/nerf%2023.jpg?raw=true">
        </a>
      </div>
    </div>
  </div>
</div>

<!-- CARD 2 -->
<div class="card">
  <div class="card-header">Gellyball Battle Tag (orbee blaster)</div>
  <div class="swiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide">
        <a href="https://www.fargotag.com/" target="_blank">
          <img src="https://github.com/Pengister/Anytime-fun-first-gallery/blob/main/gellyball.jpg?raw=true">
        </a>
      </div>
    </div>
  </div>
</div>

<!-- CARD 3 -->
<div class="card">
  <div class="card-header">Tactical Laser Tag</div>
  <div class="swiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide">
        <a href="https://www.fargotag.com/" target="_blank">
          <img src="https://github.com/Pengister/Anytime-fun-first-gallery/blob/main/laser%20tag%207.jpeg?raw=true">
        </a>
      </div>
    </div>
  </div>
</div>

</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
document.querySelectorAll('.swiper').forEach((el) => {
  new Swiper(el, {
    loop: true,
    spaceBetween: 10,
  });
});
</script>

</body>
</html>
